name: CI/CD

# When this pipeline runs:
# - every push to main
# - every pull request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code onto the runner
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install Node.js (cache npm deps between runs for speed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install exact versions from package-lock.json (reproducible, unlike npm install)
      - name: Install dependencies
        run: npm ci

      # 4. Fail the pipeline if there's a lint error
      - name: Lint
        run: npm run lint

      # 5. Fail the pipeline if a test assertion is wrong
      - name: Test
        run: npm run test

      # 6. Fail the pipeline if the app doesn't build
      - name: Build
        run: npm run build

  # This second job is the "CD" half. It only runs after `build` succeeds,
  # and only for real pushes to main (not PRs) — so opening a PR gives you
  # lint+test+build feedback, but never touches production.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # Builds the Dockerfile and pushes the image to GitHub Container Registry
  # (ghcr.io). Runs in parallel with `deploy` — separate learning exercise,
  # not required for the Vercel deploy to work. Proves the same Dockerfile
  # you tested locally also builds cleanly on a clean CI machine.
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # GITHUB_TOKEN is auto-generated per run, no secret to create yourself
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cicd-learn:latest
            ghcr.io/${{ github.repository_owner }}/cicd-learn:${{ github.sha }}
